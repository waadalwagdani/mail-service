  <title>خدمة البريد الدوائي بـمجمع الملك فيصل الطبي</title>
  <style>
    :root{
      --bg1:#eef4fb; --bg2:#f8fbfe; --surface:#ffffff; --surface-soft:#f7fbff;
      --primary:#4578b1; --primary-dark:#35669b; --primary-soft:#edf4fc;
      --border:#d9e4ef; --text:#18324a; --muted:#6d8297; --error:#bf4a4a;
      --error-soft:#fff5f5; --success:#20865d; --success-soft:#eef9f4;
      --shadow:0 18px 48px rgba(22,48,77,.08); --radius-xl:28px; --radius-lg:20px;
      --radius-md:16px; --tap:54px; --container:980px;
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{
      margin:0;min-height:100vh;font-family:"Noto Sans Arabic","Tajawal","Segoe UI",Arial,sans-serif;color:var(--text);
      background:

        linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%);
      line-height:1.6
    }
    a{color:var(--primary-dark);text-decoration:none}
    .page{width:100%;max-width:calc(var(--container) + 32px);margin:0 auto;padding:18px 16px 44px}
    .shell{
      background:rgba(255,255,255,.96);border:1px solid var(--border);border-radius:var(--radius-xl);
      overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(8px)
    }
    .hero{
      position:relative;overflow:hidden;background:linear-gradient(135deg,#4b7db7 0%, #3e70a8 48%, #315f93 100%);
      color:#fff;padding:30px 20px 26px
    }
    .hero:before,.hero:after{
      content:"";position:absolute;border-radius:999px;background:rgba(255,255,255,.08);pointer-events:none
    }

    .hero:after{width:180px;height:180px;bottom:-72px;right:-45px}
